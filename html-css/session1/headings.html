<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Heading Hierarchy</title>
</head>

<body>

<h1>My Portfolio</h1>

<h2>About Me</h2>

<h2>Skills</h2>

<h3>JavaScript</h3>

<h2>Contact</h2>

<!--
The heading that should directly follow an h1 is usually h2.
Headings should follow a logical hierarchy without skipping levels.
-->

</body>

</html>
