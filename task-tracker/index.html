<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>📋 Task Tracker</h1>
    </header>

    <main>

        <section class="task-form">

            <form id="task-form">

                <div class="form-group">
                    <label for="task-name">Task Name</label>
                    <input
                        type="text"
                        id="task-name"
                        placeholder="Enter task..."
                        required>
                </div>

                <div class="form-group">
                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="due-date">Due Date</label>
                    <input
                        type="date"
                        id="due-date"
                        required>
                </div>

                <button type="submit">
                    Add Task
                </button>

            </form>

        </section>

        <section class="controls">

            <div class="filters">

                <button id="all-btn">All</button>
                <button id="pending-btn">Pending</button>
                <button id="done-btn">Done</button>

            </div>

            <div class="sort">

                <label for="sort-select">
                    Sort
                </label>

                <select id="sort-select">
                    <option value="priority">
                        By Priority
                    </option>

                    <option value="dueDate">
                        By Due Date
                    </option>
                </select>

            </div>

        </section>

        <section>

            <h2>Task List</h2>

            <p id="counter">
                Showing 0 of 0 tasks
            </p>

            <ul id="task-list">

            </ul>

            <button id="clear-all">
                Clear All
            </button>

        </section>

        <section>

            <h2>Summary</h2>

            <table>

                <thead>

                    <tr>
                        <th>Task</th>
                        <th>Priority</th>
                        <th>Due Date</th>
                        <th>Status</th>
                    </tr>

                </thead>

                <tbody id="summary-body">

                </tbody>

            </table>

            <h3>Priority Count</h3>

            <table>

                <thead>

                    <tr>
                        <th>Priority</th>
                        <th>Count</th>
                    </tr>

                </thead>

                <tbody id="priority-summary">

                </tbody>

            </table>

        </section>

    </main>

    <footer>

        <p>
            Task Tracker © 2026
        </p>

    </footer>

    <script type="module" src="main.js"></script>

</body>

</html>
